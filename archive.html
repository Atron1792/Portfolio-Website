<body>
  <nav class="navbar">
    <div class="nav-logo">
      <a href="/">
        <img src="/assets/logo.png" alt="MA Logo" class="logo-image" />

    </div>
    <div class="nav-menu">

        year: 2025,
        company: 'CalgaryHacks 2025'
      },
      {
        title: 'Portfolio Website',
        tech: ['HTML', 'CSS', 'JavaScript'],

        company: 'Personal Project'

      {

      },
      {

      {

    ];
    
    const tbody = document.getElementById('archive-projects');
    
    projects
      .sort((a, b) => b.year - a.year)
      .forEach(project => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="project-year">${project.year}</td>
          <td>
            <div class="project-title">${project.title}</div>
          </td>
          <td class="project-company">${project.company}</td>
          <td class="project-tech">${project.tech ? project.tech.join(' • ') : ''}</td>

              ${project.github ? `
                <a href="${project.github}" target="_blank" aria-label="GitHub">

              ` : ''}

          </td>
        `;
        tbody.appendChild(row);
